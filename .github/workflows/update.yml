name: Update fuel price

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        run: node update_price.js

      - name: Commit update
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add .
          git commit -m "update fuel price" || echo "no change"
          git push
