name: Update Fuel Price

on:
  schedule:
    - cron: '*/30 * * * *' # Chạy 30 phút một lần (GitHub Actions không nên chạy quá dày)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          npm install playwright
          npx playwright install chromium
          
      - name: Run Scraper
        run: node update_price.js
        
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add giaxang_v1.html giaxang_v2.html price.json
          git commit -m "Cập nhật giá xăng: $(date)" || exit 0
          git push
