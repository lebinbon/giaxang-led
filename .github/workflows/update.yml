name: Update Fuel Price

on:
  schedule:
    # Chạy mỗi 10 phút (GitHub Actions tối thiểu là 5-10 phút để tránh bị khóa tài khoản)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Vẫn giữ nút bấm tay để test

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Thêm chế độ timeout để nếu web kẹt thì nó tự ngắt, không tốn thời gian
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright fs

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run Scraper
        run: node update_price.js

      - name: Commit and Push
        run: |
          git config --global user.name "lebinbon"
          git config --global user.email "lebinbon@users.noreply.github.com"
          git add giaxang_v1.html price.json
          
          # Chỉ commit nếu có sự thay đổi giá thực sự để tránh làm rác lịch sử
          git commit -m "Cập nhật giá mới: $(date)" || exit 0
          
          git push origin main --force
