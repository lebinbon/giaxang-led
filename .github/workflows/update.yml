name: Update fuel price

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm init -y
          npm install axios cheerio

      - name: Run script
        run: node update_price.js

      - name: Commit update
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add price.json
          git commit -m "update fuel price" || echo "no change"
          git push
