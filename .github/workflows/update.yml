name: Update Fuel Price

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Nâng lên v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4 # Nâng lên v4
        with:
          node-version: '24' # Dùng bản mới nhất theo khuyến nghị của GitHub
          
      - name: Install dependencies
        run: |
          npm install playwright
          npx playwright install chromium
          
      - name: Run Scraper
        run: node update_price.js
        
      - name: Commit and Push
        run: |
          git config --global user.name "lebinbon"
          git config --global user.email "lebinbon@users.noreply.github.com"
          git add giaxang_v1.html giaxang_v2.html price.json
          git commit -m "Cập nhật giá xăng: $(date)" || exit 0
          git push
