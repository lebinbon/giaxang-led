name: Update Fuel Price

on:
  schedule:
    - cron: '*/10 * * * *' # Tự động chạy mỗi 10 phút
  workflow_dispatch:      # Nút bấm chạy bằng tay

permissions:
  contents: write         # Cấp quyền ghi file để lưu giá xăng

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Đây chính là đoạn bạn hỏi, nó nằm sau bước Setup Node.js
      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Scraper
        run: node update_price.js

      - name: Commit and Push
        run: |
          git config --global user.name "lebinbon"
          git config --global user.email "lebinbon@users.noreply.github.com"
          git add giaxang_v1.html price.json
          git commit -m "Auto update: $(date)" || exit 0
          git push origin main --force
