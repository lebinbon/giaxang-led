name: Update Fuel Price

on:
  schedule:
    - cron: '*/10 * * * *' # Tự động chạy mỗi 10 phút
  workflow_dispatch:      # Nút bấm chạy bằng tay để kiểm tra ngay

permissions:
  contents: write         # Cấp quyền ghi để cập nhật giá xăng

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Scraper
        run: node update_price.js

      - name: Commit and Push
        run: |
          git config --global user.name "lebinbon"
          git config --global user.email "lebinbon@users.noreply.github.com"
          
          # LỆNH QUAN TRỌNG: Thêm cả v1 và v2 vào danh sách cập nhật
          git add giaxang_v1.html giaxang_v2.html price.json
          
          git commit -m "Cập nhật giá tự động: $(date)" || exit 0
          
          # Ép buộc cập nhật để tránh lỗi kẹt log
          git push origin main --force
