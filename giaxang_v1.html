
    <!DOCTYPE html>
    <html>
    <head><meta charset='utf-8'><style>
        body { 
            margin:0; 
            background: transparent; 
            color:#FFD700; 
            font-family: "Arial Narrow", Arial, sans-serif; 
            font-size: 25px; /* Kích thước vừa vặn */
            font-weight: bold; 
            overflow: hidden; 
            white-space: nowrap;
            /* Đổ bóng để nổi bật trên nền trong suốt */
            text-shadow: 2px 2px 3px #000;
            letter-spacing: -0.5px; /* Thu hẹp khoảng cách chữ một chút để đủ chỗ */
        }
        .container { 
            width: 1872px; 
            height: 82px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 10px; 
            box-sizing: border-box; 
        }
        .label { color: #FFFFFF; }
        .separator { color: #FFFFFF; margin: 0 5px; }
        .price-value { color: #00FF00; }
    </style></head>
    <body>
        <div class="container">
            <span class="label">GIÁ BÁN LẺ (Đ/L):</span>
            
            <span>XĂNG RON 95-III: <span class="price-value">25.240</span></span>
            <span class="separator">|</span>
            
            <span>XĂNG E5 RON 92-II: <span class="price-value">22.950</span></span>
            <span class="separator">|</span>
            
            <span>DẦU DO 0,001S-V: <span class="price-value">26.670</span></span>
            <span class="separator">|</span>
            
            <span>DẦU DO 0,05S-II: <span class="price-value">26.470</span></span>
        </div>
    </body>
    </html>
