<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
font-family:Arial;
}

.banner{

width:100%;
height:58px;

display:flex;
align-items:center;

background:rgba(0,0,0,0.6);

color:white;
font-size:28px;
font-weight:bold;

}

.item{
margin-left:40px;
}

.price{
color:#FFD700;
margin-left:8px;
}

.diesel{
color:#00ff66;
}

</style>

</head>

<body>

<div class="banner">

<div class="item">BẢNG GIÁ PETROLIMEX</div>

<div class="item">
RON95: <span class="price" id="ron95"></span>
</div>

<div class="item">
E5: <span class="price" id="e5"></span>
</div>

<div class="item">
DO 0.001: <span class="price diesel" id="do001"></span>
</div>

<div class="item">
DO 0.05: <span class="price diesel" id="do005"></span>
</div>

</div>

<script>

async function loadPrice(){

const r = await fetch("price.json?" + Date.now());

const d = await r.json();

document.getElementById("ron95").innerText = d.ron95;
document.getElementById("e5").innerText = d.e5;
document.getElementById("do001").innerText = d.do001;
document.getElementById("do005").innerText = d.do005;

}

loadPrice();

setInterval(loadPrice,60000);

</script>

</body>
</html>
